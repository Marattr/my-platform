server:
  port: 8080

app:
  x-api-key: "X_API_KEY"

spring:
  application:
    name: api-gateway
  security:
    jwt:
      secret: ${JWT_SECRET:I2locy5jb20udHIhaWhzY29tdHItc2VjcmV0LWtleSM=}
      #secret #ihs.com.tr!ihscomtr-secret-key#
  cloud:
    gateway:
      routes:
        - id: currency-service
          uri: ${CURRENCY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/currency/**
        - id: customer-service
          uri: ${CUSTOMER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/customer/**
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/auth/**
        - id: customer-product-service
          uri: ${CUSTOMER_PRODUCT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/customer-product/**
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/order/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
    config:
      uri: ${CONFIG_SERVER_URL:http://localhost:8888}
      fail-fast: false

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always
