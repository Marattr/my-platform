spring:
  application:
    name: currency-service
  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:8888}

management:
  endpoints:
    web:
      exposure:
        include: refresh, health, info

currency-service:
  url: http://currency-service:8081

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 5000
        loggerLevel: basic
  circuitbreaker:
    enabled: true