spring:
  application:
    name: currency-service
  config:
    import: configserver:http://localhost:8888

management:
  endpoints:
    web:
      exposure:
        include: refresh, health, info

currrency-service:
  url: http://localhost:8082

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 5000
        loggerLevel: basic
  circuitbreaker:
    enabled: true