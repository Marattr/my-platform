apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  labels:
    app: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: config-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 120   # 60 → 120 (Spring Boot + Git clone için)
            periodSeconds: 30
            timeoutSeconds: 5          # 1 → 5 (Actuator yavaş cevap verebilir)
            failureThreshold: 5        # 3 → 5 (daha toleranslı)
          readinessProbe:
              httpGet:
                path: /actuator/health
                port: 8888
              initialDelaySeconds: 60    # 30 → 60
              periodSeconds: 10
              timeoutSeconds: 5          # 1 → 5
              failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
spec:
  selector:
    app: config-server
  ports:
    - port: 8888
      targetPort: 8888
      protocol: TCP
  type: ClusterIP