apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  labels:
    app: customer-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: customer-service
          image: customer-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: CONFIG_SERVER_URL
              value: "http://config-server:8888"
            - name: DATABASE_URL
              value: "host.docker.internal:5432"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 120   # 60 → 120 (Spring Boot + Git clone için)
            periodSeconds: 30
            timeoutSeconds: 5          # 1 → 5 (Actuator yavaş cevap verebilir)
            failureThreshold: 5        # 3 → 5 (daha toleranslı)
          readinessProbe:
              httpGet:
                path: /actuator/health
                port: 8082
              initialDelaySeconds: 60    # 30 → 60
              periodSeconds: 10
              timeoutSeconds: 5          # 1 → 5
              failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
spec:
  selector:
    app: customer-service
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
  type: ClusterIP